session_name: session
windows:
  - window_name: home
    window_index: 1
    layout: main-horizontal
    panes:
      - start_directory: "~"
  - window_name: dotfiles
    window_index: 2
    panes:
      - start_directory: "~/Share/dotfiles"
        shell_command: nvim .
  - window_name: Share
    window_index: 3
    start_directory: "~/Share"
    shell_command_before: nvim .
    panes:
      -
  - window_name: Downloads
    window_index: 4
    panes:
      - start_directory: "~/Downlaods"
        shell_command: y .
