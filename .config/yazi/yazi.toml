[mgr]
show_hidden = true

[opener]
open = [
  { run = 'xdg-open %s1', desc = "Open", for = "unix" },
  { run = 'start "" "%s1"', desc = "Open", for = "windows" },
]
play = [
	{ run = "mpv %s", orphan = true }
]
edit = [
	{ run = "$EDITOR %s", block = true, for = "unix" },
	{ run = "%EDITOR% %s", block = true, for = "windows" },
	# { run = "subl %s", block = true, for = "windows" },
]

## Shell
wezterm = [
	{ run = "wezterm-gui start %s", orphan = true, desc = "wezterm" },
]
bash = [
	{ run = "wezterm-gui start bash %s", orphan = true, desc = "bash" },
]
## Text
tabiew = [
	{ run = "wezterm-gui start tw %s", orphan = true, desc = "tabiew" },
]
tailspin = [
	{ run = "wezterm-gui start tspin %s", orphan = true, desc = "tailspin" },
]
fx = [
	{ run = "wezterm-gui start fx %s", orphan = true, desc = "f(x)" },
]
qsv = [
	{ run = "wezterm-gui start qsv lens %s", orphan = true, desc = "qsv" },
]
## Book
sioyek = [
	{ run = "sioyek %s", orphan = true, desc = "Sioyek" },
]
sumatra = [
	{ run = "SumatraPDF %s", orphan = true, desc = "SumatraPDF", for = "windows" },
]
mupdf = [
	{ run = "mupdf %s", orphan = true, desc = "MuPDF" },
]
## Image
qview = [
	{ run = "qview %s", orphan = true, desc = "qView" },
]
jpegview = [
	{ run = "jpegview %s", orphan = true, desc = "JPEGView", for = "windows" },
]
imageglass = [
	{ run = "ImageGlass %s", orphan = true, desc = "ImageGlass", for = "windows" },
]
## Manga
yacreader = [
	{ run = "YACReader %s", orphan = true, desc = "YACReader" },
]
## Other
mpvc_manga = [
	{ run = "mpvc manga %s", orphan = true, desc = "mpvc manga" },
]
mpvc_music = [
	{ run = "mpvc music %s", orphan = true, desc = "mpvc music" },
]

[open]
prepend_rules = [
	{ url = "*.log", use = ["tailspin", "reveal"] },
	{ url = "*.csv", use = ["qsv", "tabiew", "reveal"] },
	{ mime = "application/json", use = ["fx", "reveal"] },
	{ mime = "application/pdf", use = ["sioyek", "sumatra", "reveal"] },
	{ mime = "application/epub*", use = ["mupdf", "reveal"] },
	{ url = "*.epub", use = ["sioyek", "mupdf", "reveal"] },
	{ mime = "image/*", use = ["jpegview", "imageglass", "reveal"] },
	{ url = "*.avif", use = ["qview", "reveal"] },
	{ url = "*.psd", use = ["jpegview", "reveal"] },
	{ url = "*.{cbz,cbr}", use = ["yacreader", "mpvc_manga", "reveal"] },
	{ mime = "audio/*", use = ["mpvc_music", "reveal"] },
	# { mime = "video/*", use = ["mpv", "reveal"] },
	{ url = "*.sh", use = ["bash", "reveal"] },
	{ url = "*.{cmd,bat}", use = ["wezterm", "reveal"] },
]

[plugin]
prepend_fetchers = [
	{id = "git", url = "*", run = "git", group = "git" },
	{id = "git", url = "*/", run = "git", group = "git" }
]
prepend_preloaders = [
	{ mime = "{audio,video}/*", run = "mediainfo" },
	{ mime = "application/subrip", run = "mediainfo" },
	{ mime = "application/postscript", run = "mediainfo" },
  { mime = "image/tiff", run = "raw-preview" },
  { url = "*.RW2",  run = "raw-preview" },
	{ url = "*.typ", run = "preview-typst" },
  { mime = "font/*", run = "font-sample" },
  { mime = "application/ms-opentype", run = "font-sample" },
  { url = "*.{otf,ttf,woff,woff2}", run = "font-sample" },
]
prepend_previewers = [
	{ url = "*.md", run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
	{ url = "*.csv", run = 'piper -- bat -p --color=always "$1"' },
	{ url = "*/", run = 'eza-preview' },
	# { url = "*", run = 'piper -- hexyl --border=none --terminal-width=$w "$1"' },
	{ mime = "application/epub+zip", run = "epub-preview" },
	{ mime = "{audio,video}/*", run = "mediainfo" },
	{ mime = "application/{subrip,postscript}", run = "mediainfo" },
  { mime = "image/tiff", run = "raw-preview" },
  { url = "*.RW2",  run = "raw-preview" },
	{ mime = "application/pdf", run = "to-pdf-preview" },
	{ url = "*.{docx,pptx,odp,odt}", run = 'to-pdf-preview -- libreoffice --headless --convert-to pdf --outdir "$OUTDIR" "$1"'},
	{ url = "*.typ", run = "preview-typst" },
  { mime = "font/*", run = "font-sample" },
  { mime = "application/ms-opentype", run = "font-sample" },
  { url = "*.{otf,ttf,woff,woff2}", run = "font-sample" },
	{ url = "*.{bin,exe}", run = "hexyl" }
]

[tasks]
