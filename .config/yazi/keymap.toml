[[mgr.prepend_keymap]]
on   = "<C-w>"
run  = "close"
desc = "Close the current tab, or quit if it's last"
[[mgr.prepend_keymap]]
on   = [ "<C-t>" ]
run  = "plugin close-and-restore-tab restore"
desc = "Restore the previously closed tab"

[[mgr.prepend_keymap]]
on = "\\"
run = "plugin split-tabs spl_toggle"
desc = "Split-tabs: toggle split tabs mode"
[[mgr.prepend_keymap]]
on = "<Tab>"
run = "plugin split-tabs spl_switch_tab"
desc = "Split-tabs: switch to the other pane"
[[mgr.prepend_keymap]]
on = "P"
run = "plugin split-tabs spl_preview"
desc = "Split-tabs: toggle preview pane"

[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin toggle-pane max-preview"
desc = "Maximize or restore the preview pane"

[[mgr.prepend_keymap]]
on   = "y"
run  = [ "yank", 'plugin clipboard -- --action=copy' ]
[[mgr.prepend_keymap]]
on   = "<C-p>"
run  = [ 'plugin clipboard -- --action=paste' ]

[[mgr.prepend_keymap]]
on   = [ "c", "r"]
run  = "plugin relative-path"
desc = "Copy relative path from the started path"

[[mgr.prepend_keymap]]
on   = "<A-y>"
run  = ["plugin copy-file-contents"]
desc = "Copy contents of file"

[[mgr.prepend_keymap]]
on   = [ "l" ]
run  = "plugin fast-enter"
desc = "Enter the subfolder faster, or open the file directly"

[[mgr.prepend_keymap]]
on   = "f"
run  = "plugin sticky-filter"
desc = "Sticky filter"

[[mgr.prepend_keymap]]
on   = ["s", "z"]
run  = "plugin fd-fzf"
desc = "Jump to directory"
[[mgr.prepend_keymap]]
on   = ["s", "Z"]
run  = "plugin fd-fzf hidden"
desc = "Jump to directory (hidden)"
[[mgr.prepend_keymap]]
on   = ["s", "p"]
run  = "plugin fd-fzf preview"
desc = "Jump to directory (preview)"

[[mgr.prepend_keymap]]
on   = [ "g", " " ]
run  = "plugin initial-cwd"
desc = "Go to initial directory"

[[mgr.prepend_keymap]]
on   = [ "g", "p" ]
run  = "plugin clipboard-jump"
desc = "Jump to clipboard path"

[[mgr.prepend_keymap]]
on   = [ "m" ]
run  = "plugin bookmarks save"
desc = "Save current position as a bookmark"
[[mgr.prepend_keymap]]
on   = [ "b", "b" ]
run  = "plugin bookmarks jump"
desc = "Jump to a bookmark"
[[mgr.prepend_keymap]]
on   = [ "b", "d" ]
run  = "plugin bookmarks delete"
desc = "Delete a bookmark"
[[mgr.prepend_keymap]]
on   = [ "b", "D" ]
run  = "plugin bookmarks delete_all"
desc = "Delete all bookmarks"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "a" ]
run  = "plugin compress"
desc = "Archive selected files"
[[mgr.prepend_keymap]]
on   = [ "c", "a", "p" ]
run  = "plugin compress -p"
desc = "Archive selected files (password)"
[[mgr.prepend_keymap]]
on   = [ "c", "a", "h" ]
run  = "plugin compress -ph"
desc = "Archive selected files (password+header)"
[[mgr.prepend_keymap]]
on   = [ "c", "a", "l" ]
run  = "plugin compress -l"
desc = "Archive selected files (compression level)"
[[mgr.prepend_keymap]]
on   = [ "c", "a", "u" ]
run  = "plugin compress -phl"
desc = "Archive selected files (password+header+level)"

[[mgr.prepend_keymap]]
on   = ["'", ";"]
run  = 'plugin custom-shell -- auto --interactive'
desc = "custom-shell as default, interactive"
[[mgr.prepend_keymap]]
on   = [ "'", ":" ]
run  = 'plugin custom-shell -- auto --interactive --block'
desc = "custom-shell as default, interactive, block"

[[mgr.prepend_keymap]]
on   = ["G", "i"]
run  = "plugin lazygit"
desc = "run lazygit"

[[mgr.prepend_keymap]]
on   = [ "c", "l", "s" ]
run  = "plugin makelink save"
desc = "Link: Save source path(s)"
[[mgr.prepend_keymap]]
on   = ["c", "l", "l" ]
run  = "plugin makelink soft"
desc = "Link: Create soft link(s)"
[[mgr.prepend_keymap]]
on   = [ "c", "l", "h" ]
run  = "plugin makelink hard"
desc = "Link: Create hard link(s)"
[[mgr.prepend_keymap]]
on   = [ "c", "l", "c" ]
run  = "plugin makelink clear"
desc = "Link: Clear saved paths"

[[manager.prepend_keymap]]
on   = "o"
run  = "plugin open-with-cmd -- block"
desc = "Open with command in the terminal"
[[manager.prepend_keymap]]
on   = "O"
run  = "plugin open-with-cmd"
desc = "Open with command"

[[mgr.prepend_keymap]]
on   = [ "e", "t" ]
run  = "plugin eza-preview"
desc = "Toggle tree/list dir preview"
[[mgr.prepend_keymap]]
on   = [ "e", "-" ]
run  = "plugin eza-preview inc-level"
desc = "Increment tree level"
[[mgr.prepend_keymap]]
on   = [ "e", "_" ]
run  = "plugin eza-preview dec-level"
desc = "Decrement tree level"
[[mgr.prepend_keymap]]
on   = [ "e", "$" ]
run  = "plugin eza-preview toggle-follow-symlinks"
desc = "Toggle tree follow symlinks"
[[mgr.prepend_keymap]]
on   = [ "e", "*" ]
run  = "plugin eza-preview toggle-hidden"
desc = "Toggle hidden files"
[[mgr.prepend_keymap]]
on   = [ "e", "g", "i" ]
run  = "plugin eza-preview toggle-git-ignore"
desc = "Toggle .gitignore files"
[[mgr.prepend_keymap]]
on   = [ "e", "g", "s" ]
run  = "plugin eza-preview toggle-git-status"
desc = "Toggle showing git status"

[[mgr.prepend_keymap]]
on   = ["<F3>"]
run  = "plugin mediainfo -- toggle-metadata"
desc = "Toggle media preview metadata"

[[mgr.prepend_keymap]]
on   = [ "c", "m" ]
run  = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on   = "M"
run  = "plugin mount"

[[mgr.prepend_keymap]]
on   = ["P", "s"]
run  = "plugin sxiv"
desc = "Preview images in sxiv"
