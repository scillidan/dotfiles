matches:
  - trigger: ":bini"
    replace: "bin install github.com/$|$ .exe"
  - trigger: ":buni"
    replace: "bun add --registry https://npmreg.proxy.ustclug.org -g"
  - trigger: ":bunu"
    replace: "bun remove -g"
  - trigger: ":yai"
    replace: "ya pkg install"
  - trigger: ":spi"
    replace: "sudo pacman -S"
  - trigger: ":yas"
    replace: "yay -S --noconfirm"
  - trigger: ":sil"
    replace: "scoop install \"%CD%\\bucket\\$|$.json\""
  - trigger: ":sir"
    replace: "scoop install https://raw.githubusercontent.com/scillidan/scoop-bucket/refs/heads/master/bucket/$|$.json"
  - trigger: ":lnbin"
    replace: "ln -sfn $(pwd)/$|$ ~/.local/bin/"
  - trigger: ":mlbin"
    replace: "mklink %USERPROFILE%\\.local\\bin\\$|$ %CD%\\"

  - trigger: ":gc"
    replace: "git clone --depth=1 "
  - trigger: ":sh"
    replace: "#!/usr/bin/env bash"
  - trigger: ":clip"
    replace: "powershell \"Get-Clipboard\" | "

  ## python
  - trigger: ":uvi"
    replace: "uv tool install"
  - trigger: ":wpa"
    replace: "python -m venv .venv\n.venv\\Scripts\\activate"
  - trigger: ":wva"
    replace: "uv venv\n.venv\\Scripts\\activate"
  - trigger: ":va"
    replace: ".venv\\Scripts\\activate"
  - trigger: ":itorch"
    replace: "uv pip install torch --index-url https://download.pytorch.org/whl/cu12"
