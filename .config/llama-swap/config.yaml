      ${server} \
        --port ${PORT} \
        --model ${models_dir}/gemma-3-4b-it-qat-Q4_K_M.gguf \
        --ctx-size 8192 \
        -ngl 99 \
        --flash-attn on \
        --jinja \
        --cache-type-k q8_0 --cache-type-v q4_0 \
        --temp 1.0 --top-p 0.95 --top-k 64 --min-p 0.0 --repeat-penalty 1.1
    ttl: 600
    aliases:
      - "gemma3:4b"

  # https://huggingface.co/google/gemma-3-1b-it-qat-q4_0-gguf
