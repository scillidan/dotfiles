health:
  timeout: 150

macros:
  models_dir: "${env.USERHOME}\\Local\\Model\\llama.cpp"
  server: "llama-server.exe"

models:
  gemma-3-12b-it:
    name: "Gemma 3 12B IT (Q5_K_M)"
    cmd: |
      ${server} \
        --port ${PORT} \
        --model ${models_dir}/gemma-3-12b-it-Q5_K_M.gguf \
        --ctx-size 8192 \
        -ngl 99 \
        --flash-attn on \
        --jinja \
        --cache-type-k q8_0 --cache-type-v q4_0 \
        --temp 1.0 --top-p 0.95 --top-k 64 --min-p 0.0
    ttl: 600
    aliases:
      - "gemma3:12b"

  gemma-3-4b-it-qat:
    name: "Gemma 3 4B IT (Q4_K_M)"
    cmd: |
      ${server} \
        --port ${PORT} \
        --model ${models_dir}/gemma-3-4b-it-qat-Q4_K_M.gguf \
        --ctx-size 8192 \
        -ngl 99 \
        --flash-attn on \
        --jinja \
        --cache-type-k q8_0 --cache-type-v q4_0 \
        --temp 1.0 --top-p 0.95 --top-k 64 --min-p 0.0
    ttl: 600
    aliases:
      - "gemma3:4b"

  mistral-7b-instruct-v0.3:
    name: "Mistral 7B Instruct v0.3 (Q5_K_M)"
    cmd: |
      ${server} \
        --port ${PORT} \
        --model ${models_dir}/Mistral-7B-Instruct-v0.3.Q5_K_M.gguf \
        --ctx-size 8192 \
        -ngl 99 \
        --flash-attn on \
        --cache-type-k q8_0 --cache-type-v q4_0 \
        --temp 0.7 --top-p 0.9 --top-k 40 --repeat-penalty 1.1
    ttl: 600
    aliases:
      - "mistral:7b"

  qwen3-14b:
    name: "Qwen3-14B (Q4_K_M)"
    cmd: |
      ${server} \
        --port ${PORT} \
        --model ${models_dir}/Qwen3-14B-Q4_K_M.gguf \
        --ctx-size 8192 \
        --n-gpu-layers 99 \
        --flash-attn on \
        --jinja \
        --cache-type-k q8_0 \
        --cache-type-v q4_0 \
        --temp 0.6 \
        --top-p 0.95 \
        --top-k 20 \
        --min-p 0.0 \
        --repeat-penalty 1.0 \
        --reasoning off
    ttl: 300
    aliases:
      - "qwen3:14b"
