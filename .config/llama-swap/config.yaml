    name: "Gemma 3 1B IT (Q4_0)"
    cmd: |
      ${server} \
        --port ${PORT} \
        --model ${models_dir}/gemma-3-1b-it-q4_0.gguf \
        --ctx-size 2048 \
        -ngl 99 \
        --flash-attn on \
        --jinja \
        --cache-type-k q8_0 --cache-type-v q4_0 \
        --temp 1.0 --top-p 0.95 --top-k 64 --min-p 0.0
    ttl: 600
    aliases:
      - "gemma3:1b"

  # https://huggingface.co/gnokit/gemma_2b_coedit
  gemma-2b-coedit:
    name: "Gemma 2B CoEdit (Q4_K_M)"
    cmd: |
      ${server} \
        --port ${PORT} \
        --model ${models_dir}/gemma_2b_coedit-unsloth.Q4_K_M.gguf \
        --ctx-size 4096 \
        -ngl 99 \
        --flash-attn on \
        --jinja \
        --cache-type-k q8_0 --cache-type-v q4_0 \
        --temp 0.7 --top-p 0.9 --top-k 40 --repeat-penalty 1.1
    ttl: 600
    aliases:
      - "gemma2:coedit"

  # https://huggingface.co/MaziyarPanahi/Mistral-7B-Instruct-v0.3-GGUF
  mistral-7b-instruct-v0.3:
    name: "Mistral 7B Instruct v0.3 (Q5_K_M)"
