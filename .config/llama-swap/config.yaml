# GPU: ROG Strix Ge Force RTX 4070 Ti 12G Gaming

health:
  timeout: 150

macros:
  models_dir: "${env.USERHOME}\\Local\\Model\\llama.cpp"
  server: "llama-server.exe"

models:
  # https://huggingface.co/unsloth/gemma-3-12b-it-GGUF
  gemma-3-12b-it:
    name: "Gemma 3 12B IT (Q5_K_M)"
    cmd: |
      ${server} \
        --port ${PORT} \
        --model ${models_dir}/gemma-3-12b-it-Q5_K_M.gguf \
        --ctx-size 8192 \
        -ngl 99 \
        --flash-attn on \
        --jinja \
        --cache-type-k q8_0 --cache-type-v q4_0 \
        --temp 1.0 --top-p 0.95 --top-k 64 --min-p 0.0 --repeat-penalty 1.1
    ttl: 600
    aliases:
      - "gemma3:12b"

  # https://huggingface.co/mradermacher/translategemma-12b-it-i1-GGUF
  translategemma-12b-it-i1:
    name: "TranslateGemma 12B IT I1 (Q4_K_M)"
    cmd: |
      ${server} \
        --port ${PORT} \
        --model ${models_dir}/translategemma-12b-it.i1-Q4_K_M.gguf \
        --ctx-size 16384 \
        -ngl 99 \
        --flash-attn on \
        --no-jinja \
        --cache-type-k q8_0 --cache-type-v q4_0 \
        --temp 1.0 --top-p 0.95 --top-k 64 --min-p 0.0 --repeat-penalty 1.1
    ttl: 600
    aliases:
      - "translategemma:12b"

  # https://huggingface.co/unsloth/gemma-3-4b-it-qat-GGUF
  gemma-3-4b-it-qat:
    name: "Gemma 3 4B IT (Q4_K_M)"
