[main]
scan_start_menu = yes
scan_env_path = no
scan_desktop = yes

[cmd/wssh]
cmd = wezterm ssh scillidan@arch

[cmd/bucket]
cmd = subl C:\Users\User\Scoop\buckets\bucket
[cmd/dotfile]
cmd = subl C:\Users\User\Usr\Git\dotfiles
[cmd/rofi-shortcuts]
cmd = subl C:\Users\User\Usr\Git\File\bin\_arch_rofi-shortcuts
[cmd/snippets]
cmd = subl C:\Users\User\Git\dotfiles\sublime-text\Snippets\{{*}}.sublime-snippet
[cmd/vanta]
cmd = subl C:\Users\User\Usr\Source\neovim\vanta.nvim\lua\vanta\palette.lua
# [cmd/vsix]
# cmd = vscodium "C:\Users\User\Scoop\persist\vscodium\data\user-data\User\settings.json"

[cmd/rss]
cmd = brave https://github.com/scillidan/github-search-rss/edit/main/src/RSS.ts
[cmd/feeds]
cmd = brave https://github.com/scillidan/rssTea/edit/main/feeds.txt
[cmd/startpage]
cmd = brave https://github.com/scillidan/excalith-start-page/edit/main/data/settings.json

[cmd/obsi]
cmd = obsidian://actions-uri/omnisearch/open?vault=Vault&query={{*}}
