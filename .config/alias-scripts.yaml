pro: bash cds.sh pro
rss: bash cds.sh repos status
rsp: bash cds.sh repos pull
rse: bash cds.sh repos exec
rsu: bash cds.sh repos update
serve: bash cds.sh serve
rnr: bash cds.sh gsudo renamer --editor nvim *
